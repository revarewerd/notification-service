# ============================================================
# Notification Service — application.conf
# ============================================================

app {
  kafka {
    bootstrap-servers = "localhost:9092"
    bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}
    consumer-group-id = "notification-service"
    consumer-group-id = ${?KAFKA_CONSUMER_GROUP}
    topics = ["geozone-events", "rule-violations", "device-status"]
  }

  database {
    url = "jdbc:postgresql://localhost:5432/tracker_notifications"
    url = ${?DATABASE_URL}
    user = "postgres"
    user = ${?DATABASE_USER}
    password = "postgres"
    password = ${?DATABASE_PASSWORD}
    max-pool-size = 10
    max-pool-size = ${?DATABASE_MAX_POOL_SIZE}
  }

  redis {
    host = "localhost"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
  }

  http {
    port = 8094
    port = ${?HTTP_PORT}
  }

  channels {
    smtp {
      host = "smtp.gmail.com"
      host = ${?SMTP_HOST}
      port = 587
      port = ${?SMTP_PORT}
      username = ""
      username = ${?SMTP_USERNAME}
      password = ""
      password = ${?SMTP_PASSWORD}
      from-address = "noreply@wayrecall.com"
      from-address = ${?SMTP_FROM}
      from-name = "Wayrecall Tracker"
      from-name = ${?SMTP_FROM_NAME}
      use-tls = true
      use-tls = ${?SMTP_USE_TLS}
    }

    sms {
      enabled = false
      enabled = ${?SMS_ENABLED}
      provider = "sms.ru"
      provider = ${?SMS_PROVIDER}
      api-key = ""
      api-key = ${?SMS_API_KEY}
    }

    push {
      enabled = false
      enabled = ${?PUSH_ENABLED}
      credentials-file = ""
      credentials-file = ${?FCM_CREDENTIALS_FILE}
    }

    telegram {
      enabled = false
      enabled = ${?TELEGRAM_ENABLED}
      bot-token = ""
      bot-token = ${?TELEGRAM_BOT_TOKEN}
    }

    webhook {
      enabled = true
      enabled = ${?WEBHOOK_ENABLED}
      timeout-seconds = 10
      timeout-seconds = ${?WEBHOOK_TIMEOUT}
      max-retries = 3
      max-retries = ${?WEBHOOK_MAX_RETRIES}
    }
  }

  rate-limits {
    email = 100
    email = ${?RATE_LIMIT_EMAIL}
    sms = 20
    sms = ${?RATE_LIMIT_SMS}
    push = 50
    push = ${?RATE_LIMIT_PUSH}
    telegram = 30
    telegram = ${?RATE_LIMIT_TELEGRAM}
    webhook = 200
    webhook = ${?RATE_LIMIT_WEBHOOK}
  }
}
